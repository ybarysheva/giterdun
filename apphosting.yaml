# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

buildSteps:
  - name: fetch
  - name: setup_node
    params:
      version: 20
  - name: install
    params:
      command: npm ci
  - name: build
    params:
      command: npm run build

runConfig:
  runtime: nodejs20
  maxInstances: 1
  